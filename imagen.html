<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure - Análisis de Imágenes</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        padding: 2rem;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 1.5rem;
    }

    .header h2 {
        font-size: 24px;
        font-weight: 600;
        color: #cba6f7;
    }

    .header p {
        font-size: 14px;
        color: #a0a8c0;
        margin-top: 4px;
    }

    .card {
        background: #1a1b2e;
        border: 1px solid #2a2b40;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
    }

    .field {
        margin-bottom: 1.2rem;
    }

    .field:last-child {
        margin-bottom: 0;
    }

    label {
        display: block;
        font-size: 13.5px;
        color: #b4b9d3;
        margin-bottom: 8px;
        font-weight: 500;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        background: #161625;
        border: 1px solid #2a2b40;
        border-radius: 8px;
        outline: none;
        color: #e0e0e0;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus {
        border-color: #cba6f7;
        box-shadow: 0 0 0 3px rgba(203, 166, 247, 0.15);
    }

    button#analyzeBtn {
        width: 100%;
        padding: 12px;
        background: #8b5cf6;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    button#analyzeBtn:hover {
        background: #7c3aed;
        transform: translateY(-2px);
    }

    button#analyzeBtn:disabled {
        background: #6b5b9e;
        cursor: not-allowed;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid #2a2b40;
        background: #161625;
        color: #b4b9d3;
    }

    .status-bar.running {
        border-color: #7c3aed;
        background: #2a1f4a;
        color: #cba6f7;
    }

    .status-bar.success {
        border-color: #4ade80;
        background: #1f2a22;
        color: #4ade80;
    }

    .status-bar.error {
        border-color: #f87171;
        background: #2a1f1f;
        color: #f87171;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    #previewImg {
        width: 100%;
        max-height: 300px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid #2a2b40;
    }

    .result-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #2a2b40;
    }

    .result-row:last-child {
        border-bottom: none;
    }

    .result-label {
        font-size: 13.5px;
        color: #b4b9d3;
        font-weight: 500;
        min-width: 150px;
    }

    .result-value {
        font-size: 14.5px;
        color: #e0e0e0;
    }

    .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }

    .tag {
        background: #2a1f4a;
        color: #cba6f7;
        font-size: 12.5px;
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid #4c3f7a;
    }

    .hidden {
        display: none;
    }
</style>

<body>
    <div class="container">
        <div class="header">
            <h2>Azure Image Analysis</h2>
            <p>Descripción, etiquetas y colores de cualquier imagen</p>
        </div>
        <div class="card">
            <div class="field">
                <label for="imageUrl">URL de la imagen</label>
                <input type="text" id="imageUrl"
                    value="https://img.magnific.com/fotos-premium/amigos-felices-corriendo-campo-contra-arboles_7186-4118.jpg" />
            </div>
            <button id="analyzeBtn" onclick="analizarImagen()">Analizar imagen</button>
        </div>
        <div id="statusBar" class="status-bar hidden">
            <span id="statusIcon"></span>
            <span id="statusMsg"></span>
        </div>
        <div id="resultSection" class="hidden">
            <div class="card">
                <div class="field">
                    <label>Vista previa</label>
                    <img id="previewImg" src="" alt="Vista previa" />
                </div>
            </div>
            <div class="card">
                <div class="result-row">
                    <span class="result-label">Descripción</span>
                    <span id="descripcion" class="result-value"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Confianza</span>
                    <span id="confianza" class="result-value"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Color dominante</span>
                    <span id="color" class="result-value"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Etiquetas</span>
                    <div id="etiquetas" class="tags-container"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="imagen.js"></script>
</body>

</html>
