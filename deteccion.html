<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detección de Objetos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        padding: 2rem;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 1.5rem;
    }

    .header h2 {
        font-size: 24px;
        font-weight: 600;
        color: #cba6f7;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .header p {
        font-size: 14px;
        color: #a0a8c0;
        margin-top: 4px;
    }

    .card {
        background: #1a1b2e;
        border: 1px solid #2a2b40;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
    }

    .field {
        margin-bottom: 1.2rem;
    }

    label {
        display: block;
        font-size: 13.5px;
        color: #b4b9d3;
        margin-bottom: 8px;
        font-weight: 500;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        background: #161625;
        border: 1px solid #2a2b40;
        border-radius: 8px;
        outline: none;
        color: #e0e0e0;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus {
        border-color: #cba6f7;
        box-shadow: 0 0 0 3px rgba(203, 166, 247, 0.15);
    }

    button#analyzeBtn {
        width: 100%;
        padding: 12px;
        background: #8b5cf6;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
    }

    button#analyzeBtn:hover {
        background: #7c3aed;
        transform: translateY(-2px);
    }

    button#analyzeBtn:disabled {
        background: #6b5b9e;
        cursor: not-allowed;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid #2a2b40;
        background: #161625;
        color: #b4b9d3;
    }

    .status-bar.running {
        border-color: #7c3aed;
        background: #2a1f4a;
        color: #cba6f7;
    }

    .status-bar.success {
        border-color: #4ade80;
        background: #1f2a22;
        color: #4ade80;
    }

    .status-bar.error {
        border-color: #f87171;
        background: #2a1f1f;
        color: #f87171;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Canvas superpuesto */
    .canvas-wrapper {
        position: relative;
        display: inline-block;
        width: 100%;
    }

    .canvas-wrapper img {
        width: 100%;
        border-radius: 10px;
        display: block;
        border: 1px solid #2a2b40;
    }

    .canvas-wrapper canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 10px;
    }

    /* Lista de objetos */
    .object-item {
        padding: 12px 0;
        border-bottom: 1px solid #2a2b40;
    }

    .object-item:last-child {
        border-bottom: none;
    }

    .object-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
    }

    .object-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .object-name {
        font-size: 15px;
        font-weight: 600;
        flex: 1;
        text-transform: capitalize;
        color: #e0e0e0;
    }

    .object-confidence {
        font-size: 13px;
        font-weight: 600;
        color: #4ade80;
        background: #1f2a22;
        padding: 2px 10px;
        border-radius: 20px;
    }

    .object-coords {
        display: flex;
        gap: 1.5rem;
        font-size: 12.5px;
        color: #a0a8c0;
        padding-left: 22px;
    }

    .object-coords i {
        margin-right: 4px;
        color: #cba6f7;
    }

    .hidden {
        display: none;
    }
</style>

<body>
    <div class="container">
        <div class="header">
            <h2><i class="fa-solid fa-magnifying-glass"></i> Detección de Objetos</h2>
            <p>Identifica objetos y sus coordenadas en cualquier imagen</p>
        </div>

        <div class="card">
            <div class="field">
                <label for="imageUrl">URL de la imagen</label>
                <input type="text" id="imageUrl"
                    value="https://thumbs.dreamstime.com/b/comida-del-turista-en-descanso-almuerzo-el-bosque-fondo-de-t-123506793.jpg" />
            </div>
            <button id="analyzeBtn" onclick="detectarObjetos()">
                <i class="fa-solid fa-crosshairs"></i> Detectar objetos
            </button>
        </div>

        <div id="statusBar" class="status-bar hidden">
            <span id="statusIcon"></span>
            <span id="statusMsg"></span>
        </div>

        <div id="resultSection" class="hidden">
            <!-- Imagen con canvas superpuesto -->
            <div class="card">
                <label style="font-size:13px; color:#555; margin-bottom:8px; display:block;">
                    <i class="fa-solid fa-image"></i> Vista previa con detecciones
                </label>
                <div class="canvas-wrapper">
                    <img id="previewImg" src="" alt="Vista previa" crossorigin="anonymous" />
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <!-- Lista de objetos detectados -->
            <div class="card">
                <label style="font-size:13px; color:#555; margin-bottom:12px; display:block;">
                    <i class="fa-solid fa-list"></i> Objetos detectados
                </label>
                <div id="objectList"></div>
            </div>
        </div>
    </div>

    <script src="deteccion.js"></script>
</body>

</html>
