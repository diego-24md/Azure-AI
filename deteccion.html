<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detección de Objetos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        color: #333;
        padding: 2rem;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 1.5rem;
    }

    .header h2 {
        font-size: 22px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .header p {
        font-size: 14px;
        color: #666;
        margin-top: 4px;
    }

    .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 1.25rem;
        margin-bottom: 1rem;
    }

    .field {
        margin-bottom: 1rem;
    }

    label {
        display: block;
        font-size: 13px;
        color: #555;
        margin-bottom: 6px;
    }

    input[type="text"] {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus {
        border-color: #4a90e2;
    }

    button#analyzeBtn {
        width: 100%;
        padding: 10px;
        background-color: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s;
    }

    button#analyzeBtn:hover {
        background-color: #357abd;
    }

    button#analyzeBtn:disabled {
        background-color: #a0c4f1;
        cursor: not-allowed;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid #e0e0e0;
        background: #f9f9f9;
        color: #555;
    }

    .status-bar.running {
        border-color: #b5d4f4;
        background: #e6f1fb;
        color: #185fa5;
    }

    .status-bar.success {
        border-color: #b7e0a0;
        background: #eafbe5;
        color: #2e7d32;
    }

    .status-bar.error {
        border-color: #f7c1c1;
        background: #fcebeb;
        color: #a32d2d;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Canvas superpuesto */
    .canvas-wrapper {
        position: relative;
        display: inline-block;
        width: 100%;
    }

    .canvas-wrapper img {
        width: 100%;
        border-radius: 8px;
        display: block;
    }

    .canvas-wrapper canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 8px;
    }

    /* Lista de objetos */
    .object-item {
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;
    }

    .object-item:last-child {
        border-bottom: none;
    }

    .object-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
    }

    .object-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .object-name {
        font-size: 15px;
        font-weight: 600;
        flex: 1;
        text-transform: capitalize;
    }

    .object-confidence {
        font-size: 13px;
        font-weight: 600;
        color: #2e7d32;
        background: #eafbe5;
        padding: 2px 8px;
        border-radius: 20px;
    }

    .object-coords {
        display: flex;
        gap: 1.5rem;
        font-size: 12px;
        color: #666;
        padding-left: 22px;
    }

    .object-coords i {
        margin-right: 4px;
        color: #4a90e2;
    }

    .hidden {
        display: none;
    }
</style>
<body>
    <div class="container">
        <div class="header">
            <h2><i class="fa-solid fa-magnifying-glass"></i> Detección de Objetos</h2>
            <p>Identifica objetos y sus coordenadas en cualquier imagen</p>
        </div>

        <div class="card">
            <div class="field">
                <label for="imageUrl">URL de la imagen</label>
                <input type="text" id="imageUrl"
                    value="https://thumbs.dreamstime.com/b/comida-del-turista-en-descanso-almuerzo-el-bosque-fondo-de-t-123506793.jpg" />
            </div>
            <button id="analyzeBtn" onclick="detectarObjetos()">
                <i class="fa-solid fa-crosshairs"></i> Detectar objetos
            </button>
        </div>

        <div id="statusBar" class="status-bar hidden">
            <span id="statusIcon"></span>
            <span id="statusMsg"></span>
        </div>

        <div id="resultSection" class="hidden">
            <!-- Imagen con canvas superpuesto -->
            <div class="card">
                <label style="font-size:13px; color:#555; margin-bottom:8px; display:block;">
                    <i class="fa-solid fa-image"></i> Vista previa con detecciones
                </label>
                <div class="canvas-wrapper">
                    <img id="previewImg" src="" alt="Vista previa" crossorigin="anonymous" />
                    <canvas id="overlay"></canvas>
                </div>
            </div>

            <!-- Lista de objetos detectados -->
            <div class="card">
                <label style="font-size:13px; color:#555; margin-bottom:12px; display:block;">
                    <i class="fa-solid fa-list"></i> Objetos detectados
                </label>
                <div id="objectList"></div>
            </div>
        </div>
    </div>

    <script src="deteccion.js"></script>
</body>

</html>
