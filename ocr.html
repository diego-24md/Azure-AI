<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure OCR</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        color: #333;
        padding: 2rem;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 1.5rem;
    }

    .header h2 {
        font-size: 22px;
        font-weight: 600;
    }

    .header p {
        font-size: 14px;
        color: #666;
        margin-top: 4px;
    }

    .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 1.25rem;
        margin-bottom: 1rem;
    }

    .field {
        margin-bottom: 1rem;
    }

    .field:last-child {
        margin-bottom: 0;
    }

    label {
        display: block;
        font-size: 13px;
        color: #555;
        margin-bottom: 6px;
    }

    input[type="text"] {
        width: 100%;
        padding: 9px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus {
        border-color: #4a90e2;
    }

    button#analyzeBtn {
        width: 100%;
        padding: 10px;
        background-color: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }

    button#analyzeBtn:hover {
        background-color: #357abd;
    }

    button#analyzeBtn:disabled {
        background-color: #a0c4f1;
        cursor: not-allowed;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid #e0e0e0;
        background: #f9f9f9;
        color: #555;
    }

    .status-bar.running {
        border-color: #b5d4f4;
        background: #e6f1fb;
        color: #185fa5;
    }

    .status-bar.success {
        border-color: #b7e0a0;
        background: #eafbe5;
        color: #2e7d32;
    }

    .status-bar.error {
        border-color: #f7c1c1;
        background: #fcebeb;
        color: #a32d2d;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .meta-label {
        font-size: 13px;
        color: #555;
        font-weight: 500;
    }

    .page-badge {
        font-size: 12px;
        padding: 2px 10px;
        border-radius: 6px;
        background: #e6f1fb;
        color: #185fa5;
    }

    .copy-btn {
        background: none;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        color: #555;
        transition: background 0.15s;
    }

    .copy-btn:hover {
        background: #f0f0f0;
    }

    .result-box {
        background: #f4f6f8;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 1rem;
        font-size: 14px;
        line-height: 1.7;
        white-space: pre-wrap;
        font-family: monospace;
        min-height: 80px;
    }

    .hidden {
        display: none;
    }
</style>

<body>
    <div class="container">
        <div class="header">
            <h2>🔍 Azure OCR</h2>
            <p>Detección de texto en imágenes con Azure Computer Vision</p>
        </div>

        <div class="card">
            <div class="field">
                <label for="imageUrl">URL de la imagen o PDF</label>
                <input type="text" id="imageUrl"
                    value="https://image.slidesharecdn.com/eleditorial-220301120619/95/El-editorial-3-638.jpg" />
            </div>
            <button id="analyzeBtn" onclick="analizarTexto()">Analizar imagen</button>
        </div>

        <div id="statusBar" class="status-bar hidden">
            <span id="statusIcon"></span>
            <span id="statusMsg"></span>
        </div>

        <div id="resultSection" class="hidden">
            <div class="card">
                <div id="pagesContainer"></div>
            </div>
        </div>
    </div>

    <script src="ocr.js"></script>
</body>

</html>
