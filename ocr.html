<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure OCR</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        padding: 2rem;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        margin-bottom: 1.5rem;
    }

    .header h2 {
        font-size: 24px;
        font-weight: 600;
        color: #cba6f7;
    }

    .header p {
        font-size: 14px;
        color: #a0a8c0;
        margin-top: 4px;
    }

    .card {
        background: #1a1b2e;
        border: 1px solid #2a2b40;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
    }

    .field {
        margin-bottom: 1.2rem;
    }

    .field:last-child {
        margin-bottom: 0;
    }

    label {
        display: block;
        font-size: 13.5px;
        color: #b4b9d3;
        margin-bottom: 8px;
        font-weight: 500;
    }

    input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        background: #161625;
        border: 1px solid #2a2b40;
        border-radius: 8px;
        outline: none;
        color: #e0e0e0;
        transition: border-color 0.2s;
    }

    input[type="text"]:focus {
        border-color: #cba6f7;
        box-shadow: 0 0 0 3px rgba(203, 166, 247, 0.15);
    }

    button#analyzeBtn {
        width: 100%;
        padding: 12px;
        background: #8b5cf6;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    button#analyzeBtn:hover {
        background: #7c3aed;
        transform: translateY(-2px);
    }

    button#analyzeBtn:disabled {
        background: #6b5b9e;
        cursor: not-allowed;
    }

    .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 1px solid #2a2b40;
        background: #161625;
        color: #b4b9d3;
    }

    .status-bar.running {
        border-color: #7c3aed;
        background: #2a1f4a;
        color: #cba6f7;
    }

    .status-bar.success {
        border-color: #4ade80;
        background: #1f2a22;
        color: #4ade80;
    }

    .status-bar.error {
        border-color: #f87171;
        background: #2a1f1f;
        color: #f87171;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .result-box {
        background: #161625;
        border: 1px solid #2a2b40;
        border-radius: 8px;
        padding: 1.2rem;
        font-size: 14.5px;
        line-height: 1.7;
        white-space: pre-wrap;
        font-family: monospace;
        color: #e0e0e0;
        min-height: 100px;
    }

    .hidden {
        display: none;
    }

    .copy-btn {
        background: #2a2b40;
        border: 1px solid #3a3b52;
        color: #cdd6f4;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 12px;
        cursor: pointer;
    }

    .copy-btn:hover {
        background: #3a3b52;
    }
</style>

<body>
    <div class="container">
        <div class="header">
            <h2>Azure OCR</h2>
            <p>Detección de texto en imágenes con Azure Computer Vision</p>
        </div>

        <div class="card">
            <div class="field">
                <label for="imageUrl">URL de la imagen o PDF</label>
                <input type="text" id="imageUrl"
                    value="https://image.slidesharecdn.com/eleditorial-220301120619/95/El-editorial-3-638.jpg" />
            </div>
            <button id="analyzeBtn" onclick="analizarTexto()">Analizar imagen</button>
        </div>

        <div id="statusBar" class="status-bar hidden">
            <span id="statusIcon"></span>
            <span id="statusMsg"></span>
        </div>

        <div id="resultSection" class="hidden">
            <div class="card">
                <div id="pagesContainer"></div>
            </div>
        </div>
    </div>

    <script src="ocr.js"></script>
</body>

</html>
