<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR - Leer Texto</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">
        <h1>OCR - Leer Texto desde Imagen</h1>

        <label>Pega la URL de la imagen con texto:</label>
        <input type="text" id="ocrImageUrl" placeholder="https://ejemplo.com/imagen.jpg">

        <button onclick="leerTexto()" class="btn-primary">
            Analizar Texto
        </button>

        <div class="result" id="ocrResult">
            Aquí aparecerá el texto detectado...
        </div>

        <br>

        <a href="index.html">
            <button>Volver al inicio</button>
        </a>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
