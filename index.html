<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure AI - Servicios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background: #f4f6f8;
            color: #333;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar-logo {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid #313244;
        }

        .sidebar-logo h1 {
            font-size: 18px;
            font-weight: 700;
            color: #cba6f7;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo p {
            font-size: 12px;
            color: #6c7086;
            margin-top: 3px;
        }

        .sidebar-menu {
            padding: 1rem 0;
            flex: 1;
        }

        .menu-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c7086;
            padding: 0.75rem 1.5rem 0.4rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 1.5rem;
            font-size: 14px;
            color: #cdd6f4;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item.active {
            background: #313244;
            border-left-color: #cba6f7;
            color: #fff;
        }

        .menu-item i {
            font-size: 15px;
            width: 18px;
            text-align: center;
            color: #cba6f7;
        }

        .sidebar-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #313244;
            font-size: 12px;
            color: #6c7086;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1><i class="fa-solid fa-cloud"></i> Azure AI</h1>
            <p>Panel de servicios</p>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-label">Visión</div>
            <a class="menu-item" data-page="ocr.html"><i class="fa-solid fa-file-lines"></i> OCR</a>
            <a class="menu-item" data-page="imagen.html"><i class="fa-solid fa-image"></i> Análisis de imágenes</a>
            <a class="menu-item" data-page="deteccion.html"><i class="fa-solid fa-crosshairs"></i> Detección de
                objetos</a>
            <a class="menu-item" data-page="extraccion.html"><i class="fa-solid fa-file-export"></i> Extracción</a>

            <div class="menu-label">Lenguaje</div>
            <a class="menu-item" data-page="sentimientos.html"><i class="fa-solid fa-face-smile"></i> Sentimientos</a>
            <a class="menu-item active" data-page="preguntas.html"><i class="fa-solid fa-circle-question"></i>
                Preguntas</a>

            <div class="menu-label">IA Generativa</div>
            <a class="menu-item" data-page="chat.html"><i class="fa-solid fa-comments"></i> Chat</a>
            <a class="menu-item" data-page="chatgpt.html"><i class="fa-solid fa-robot"></i> ChatGPT</a>
        </nav>

        <div class="sidebar-footer">
            <i class="fa-solid fa-server"></i> Azure Cognitive Services
        </div>
    </aside>

    <main class="main" id="main-content">
        <!-- El contenido se cargará aquí dinámicamente -->
        <h2>Bienvenido, Diego Alonso V.</h2>
        <p class="subtitle">Selecciona un servicio de IA para comenzar</p>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');

        async function loadPage(page) {
            mainContent.innerHTML = `
            <div style="text-align:center; padding:80px 20px; color:#666;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>
                Cargando ${page}...
            </div>`;

            try {
                const response = await fetch(page);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                let html = await response.text();

                // Limpieza mejorada: extraer contenido útil
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;

                // Intentar obtener el contenido del body, si no existe usar todo
                let content = tempDiv.querySelector('body') ?
                    tempDiv.querySelector('body').innerHTML :
                    html;

                // Si no hay contenido útil, usar todo
                if (!content || content.trim() === '') {
                    content = html;
                }

                mainContent.innerHTML = content;

                // Actualizar menú activo
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.classList.toggle('active', item.getAttribute('data-page') === page);
                });

            } catch (error) {
                console.error(error);
                mainContent.innerHTML = `
                <div style="padding:40px;">
                    <h2 style="color:#e74c3c;">Error al cargar ${page}</h2>
                    <p>${error.message}</p>
                    <p style="margin-top:15px; color:#666;">
                        Verifica que el archivo <strong>${page}</strong> exista en la misma carpeta.
                    </p>
                </div>`;
            }
        }

        // Event listeners
        document.querySelectorAll('.menu-item').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.getAttribute('data-page');
                if (page) loadPage(page);
            });
        });

        // Cargar Preguntas por defecto al abrir
        window.onload = () => {
            loadPage('preguntas.html');
        };
    </script>
</body>

</html>
